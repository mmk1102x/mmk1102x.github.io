<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mmk1102x - GitHub Portfolio</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #24292f;
            --header-bg: #f6f8fa;
            --border-color: #d0d7de;
            --card-bg: #ffffff;
            --link-color: #0969da;
            --btn-bg: #f6f8fa;
            --btn-border: rgba(27, 31, 35, 0.15);
            --meta-color: #57606a;
        }

        [data-theme="dark"] {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --header-bg: #161b22;
            --border-color: #30363d;
            --card-bg: #0d1117;
            --link-color: #58a6ff;
            --btn-bg: #21262d;
            --btn-border: #363b42;
            --meta-color: #8b949e;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.5;
            transition: background-color 0.3s, color 0.3s;
        }

        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Header */
        header {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 1rem;
            text-align: center;
            position: relative;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
            background-color: var(--bg-color);
        }

        h1 { margin: 0; font-size: 24px; font-weight: 600; }
        .bio { color: var(--meta-color); margin-top: 0.5rem; }

        /* Toggle Button */
        .controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }

        .theme-toggle {
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-border);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .theme-toggle:hover { background-color: var(--border-color); }

        /* Layout */
        .container {
            max-width: 1012px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        h2 {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-top: 2rem;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .badge {
            font-size: 12px;
            font-weight: normal;
            color: var(--meta-color);
            background: var(--btn-bg);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        /* Repositories */
        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .repo-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s;
        }

        .repo-card:hover { transform: translateY(-2px); border-color: var(--link-color); }

        .repo-name { font-weight: 600; font-size: 16px; margin-bottom: 0.5rem; word-break: break-all; }
        .repo-desc { font-size: 14px; color: var(--meta-color); flex-grow: 1; margin-bottom: 1rem; }
        
        .repo-meta { 
            font-size: 12px; 
            color: var(--meta-color); 
            display: flex; 
            gap: 1rem; 
            align-items: center; 
            margin-top: auto;
        }
        
        .lang-circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            position: relative;
            top: 1px;
        }

        /* Commits */
        .commit-list {
            list-style: none;
            padding: 0;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-top: 1rem;
            background: var(--card-bg);
        }

        .commit-item {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .commit-item:last-child { border-bottom: none; }
        
        @media (min-width: 600px) {
            .commit-item {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .commit-msg { 
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 14px;
            color: var(--text-color);
            font-weight: 600;
        }

        .commit-sub { font-size: 12px; color: var(--meta-color); }
        .commit-date { font-size: 12px; color: var(--meta-color); white-space: nowrap; }

        .loading { text-align: center; padding: 2rem; color: var(--meta-color); font-style: italic; }
        .error { color: #cf222e; text-align: center; padding: 1rem; }
    </style>
</head>
<body>

    <header>
        <div class="controls">
            <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Dark Mode">🌓 Theme</button>
        </div>
        <a href="https://github.com/mmk1102x" target="_blank">
            <img id="avatar" class="avatar" src="https://github.com/identicons/mmk1102x.png" alt="Profile">
        </a>
        <h1 id="name">mmk1102x</h1>
        <div id="bio" class="bio">Loading profile...</div>
    </header>

    <div class="container">
        
        <h2>Repositories <span id="repo-count" class="badge">0</span></h2>
        <div id="repo-list" class="repo-grid">
            <div class="loading">Loading repositories...</div>
        </div>

        <h2>Latest Activity</h2>
        <ul id="commit-list" class="commit-list">
            <div class="loading">Loading history...</div>
        </ul>

    </div>

    <script>
        const USERNAME = 'mmk1102x';
        
        // --- Theme Logic ---
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }

        const savedTheme = localStorage.getItem('theme') || 
                           (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', savedTheme);

        // --- Data Fetching ---

        async function init() {
            try {
                // 1. Fetch Profile
                const userRes = await fetch(`https://api.github.com/users/${USERNAME}`);
                const user = await userRes.json();
                
                document.getElementById('avatar').src = user.avatar_url;
                document.getElementById('name').textContent = user.name || user.login;
                document.getElementById('bio').textContent = user.bio || 'Welcome to my GitHub portfolio.';
                
                // 2. Fetch Repositories
                const reposRes = await fetch(`https://api.github.com/users/${USERNAME}/repos?sort=updated&per_page=100`);
                const repos = await reposRes.json();
                
                renderRepos(repos);
                
                // 3. Fetch Activity (Try Events first, Fallback to Repo Commits)
                try {
                    await loadGlobalEvents();
                } catch (e) {
                    console.warn("Events API failed, falling back to repo commits", e);
                    await loadFallbackCommits(repos);
                }

            } catch (error) {
                console.error(error);
                document.getElementById('bio').textContent = 'Error loading profile data.';
            }
        }

        function renderRepos(repos) {
            const container = document.getElementById('repo-list');
            document.getElementById('repo-count').textContent = repos.length;
            container.innerHTML = '';

            if (!repos.length) {
                container.innerHTML = '<div class="loading">No public repositories found.</div>';
                return;
            }
            
            // Sort by stars descending, then updated
            repos.sort((a, b) => b.stargazers_count - a.stargazers_count || new Date(b.updated_at) - new Date(a.updated_at));

            const colors = { 
                JavaScript: '#f1e05a', HTML: '#e34c26', CSS: '#563d7c', 
                Python: '#3572A5', Java: '#b07219', TypeScript: '#2b7489', 
                Shell: '#89e051', C: '#555555', 'C++': '#f34b7d' 
            };

            repos.forEach(repo => {
                if (repo.fork) return; // Skip forks to clean up UI

                const card = document.createElement('div');
                card.className = 'repo-card';
                const langColor = colors[repo.language] || '#ccc';
                
                card.innerHTML = `
                    <div class="repo-name">
                        <a href="${repo.html_url}" target="_blank">${repo.name}</a>
                    </div>
                    <div class="repo-desc">${repo.description || ''}</div>
                    <div class="repo-meta">
                        ${repo.language ? `<span><span class="lang-circle" style="background:${langColor}"></span>${repo.language}</span>` : ''}
                        <span>★ ${repo.stargazers_count}</span>
                        <span>Updated ${new Date(repo.updated_at).toLocaleDateString()}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Strategy A: Global Events
        async function loadGlobalEvents() {
            const res = await fetch(`https://api.github.com/users/${USERNAME}/events?per_page=50`);
            if (!res.ok) throw new Error('Events API error');
            const events = await res.json();
            
            const container = document.getElementById('commit-list');
            container.innerHTML = '';
            
            let count = 0;
            const max = 30;

            for (const event of events) {
                if (count >= max) break;
                if (event.type === 'PushEvent' && event.payload.commits) {
                    const commits = event.payload.commits.reverse();
                    for (const commit of commits) {
                        if (count >= max) break;
                        addCommitToUI(commit.message, event.repo.name, event.created_at, commit.sha, container);
                        count++;
                    }
                }
            }

            if (count === 0) throw new Error('No recent push events');
        }

        // Strategy B: Fallback (Specific Repo)
        async function loadFallbackCommits(repos) {
            // Find most recently updated non-fork repo
            const activeRepo = repos.filter(r => !r.fork).sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at))[0];
            
            if (!activeRepo) {
                document.getElementById('commit-list').innerHTML = '<div class="loading">No repositories to fetch commits from.</div>';
                return;
            }

            const res = await fetch(`https://api.github.com/repos/${USERNAME}/${activeRepo.name}/commits?per_page=30`);
            const commits = await res.json();
            
            const container = document.getElementById('commit-list');
            container.innerHTML = '';

            commits.forEach(item => {
                addCommitToUI(item.commit.message, activeRepo.name, item.commit.committer.date, item.sha, container);
            });
        }

        function addCommitToUI(msg, repoName, dateStr, sha, container) {
            const li = document.createElement('li');
            li.className = 'commit-item';
            
            const shortMsg = msg.split('\n')[0];
            const cleanDate = new Date(dateStr).toLocaleString();
            const repoUrl = `https://github.com/${repoName}`;
            const commitUrl = `https://github.com/${repoName}/commit/${sha}`;

            li.innerHTML = `
                <div>
                    <div class="commit-msg">
                        <a href="${commitUrl}" target="_blank">${shortMsg}</a>
                    </div>
                    <div class="commit-sub">
                        in <a href="${repoUrl}" target="_blank">${repoName}</a>
                    </div>
                </div>
                <div class="commit-date">${cleanDate}</div>
            `;
            container.appendChild(li);
        }

        init();
    </script>
</body>
</html>
