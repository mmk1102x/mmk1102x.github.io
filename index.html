<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mmk1102x | System Architect</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #c9d1d9; --text-dim: #8b949e; --accent: #238636;
            --link: #58a6ff; --btn-hover: #21262d;
        }
        body.light {
            --bg: #ffffff; --card: #f6f8fa; --border: #d0d7de;
            --text: #24292f; --text-dim: #57606a; --accent: #2da44e;
            --link: #0969da; --btn-hover: #ebf0f4;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .container { max-width: 900px; width: 100%; }
        
        #profile { display: flex; align-items: center; gap: 25px; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; position: relative; }
        #avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border); }
        .theme-toggle { position: absolute; top: 20px; right: 0; cursor: pointer; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; background: var(--card); color: var(--text); font-weight: bold; }

        /* Contribution Graph */
        .graph-section { margin-bottom: 25px; text-align: left; }
        .activity-graph { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 15px; background: #0d1117; transition: 0.3s; box-sizing: border-box; }
        body.light .activity-graph { filter: invert(1) hue-rotate(180deg) brightness(1.2); background: #fff; }

        /* Stats & Feed Split */
        .layout-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 6px; text-align: center; }
        .stat-val { font-size: 18px; font-weight: bold; color: var(--accent); }

        /* Activity Feed */
        .feed-card { padding: 12px; border-left: 2px solid var(--border); margin-left: 10px; position: relative; font-size: 13px; margin-bottom: 10px; background: var(--card); border-radius: 0 6px 6px 0; }
        .feed-card::before { content: '●'; position: absolute; left: -7px; top: 12px; background: var(--bg); color: var(--text-dim); font-size: 10px; }
        .event-repo { color: var(--link); font-weight: bold; text-decoration: none; }

        /* Repos */
        #repo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .repo-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; flex-direction: column; justify-content: space-between; }
        .repo-name { color: var(--link); font-size: 16px; font-weight: bold; text-decoration: none; margin-bottom: 5px; }
        .btn-live { background: var(--accent); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 11px; text-decoration: none; font-weight: bold; align-self: flex-start; margin-top: 10px; }

        @media (max-width: 768px) { .layout-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="profile">
            <img id="avatar" src="" alt="">
            <div id="user-info">
                <h1 id="fullname" style="margin:0; font-size: 22px;">Loading...</h1>
                <div id="location" style="font-size: 13px; color: var(--text-dim);"></div>
            </div>
            <button class="theme-toggle" onclick="document.body.classList.toggle('light')">TOGGLE THEME</button>
        </div>

        <div class="graph-section">
            <div style="font-size: 11px; color: var(--text-dim); margin-bottom: 8px;">CONTRIBUTION_CALENDAR (LAST 365 DAYS)</div>
            <img class="activity-graph" src="https://ghchart.rshah.org/238636/mmk1102x" alt="Activity">
        </div>

        <div class="layout-grid">
            <div id="main-content">
                <div class="stats-grid">
                    <div class="stat-card"><div>Repos</div><div class="stat-val" id="count-repos">-</div></div>
                    <div class="stat-card"><div>Followers</div><div class="stat-val" id="count-followers">-</div></div>
                    <div class="stat-card"><div>Stars</div><div class="stat-val" id="count-stars">-</div></div>
                </div>
                <h2 style="font-size: 14px; color: var(--text-dim); border-bottom: 1px solid var(--border); padding-bottom: 5px;">ACTIVE_PROJECTS</h2>
                <div id="repo-grid"></div>
            </div>

            <div id="sidebar-content">
                <h2 style="font-size: 12px; color: var(--text-dim); margin-bottom: 15px;">SYSTEM_LOGS (COMMITS)</h2>
                <div id="activity-feed"></div>
            </div>
        </div>
    </div>

    <script>
        const username = 'mmk1102x';

        async function init() {
            try {
                const u = await fetch(`https://api.github.com/users/${username}`).then(r => r.json());
                const r = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=50`).then(r => r.json());
                const e = await fetch(`https://api.github.com/users/${username}/events/public`).then(r => r.json());

                document.getElementById('avatar').src = u.avatar_url;
                document.getElementById('fullname').innerText = u.name || u.login;
                document.getElementById('location').innerText = `📍 ${u.location || 'Hollow Knight'}`;
                document.getElementById('count-repos').innerText = u.public_repos;
                document.getElementById('count-followers').innerText = u.followers;
                document.getElementById('count-stars').innerText = r.reduce((s, repo) => s + repo.stargazers_count, 0);

                // Repos Logic
                const grid = document.getElementById('repo-grid');
                r.filter(repo => repo.name !== `${username}.github.io`).slice(0, 6).forEach(repo => {
                    const div = document.createElement('div');
                    div.className = 'repo-card';
                    const liveUrl = repo.has_pages ? `https://${username}.github.io/${repo.name}/` : null;
                    div.innerHTML = `
                        <div>
                            <a href="${repo.html_url}" target="_blank" class="repo-name">${repo.name.toUpperCase()}</a>
                            <div style="font-size: 12px; color: var(--text-dim);">${repo.description || ''}</div>
                        </div>
                        ${liveUrl ? `<a href="${liveUrl}" target="_blank" class="btn-live">RUN APPLICATION</a>` : ''}
                    `;
                    grid.appendChild(div);
                });

                // Feed Logic (PushEvents only)
                const feed = document.getElementById('activity-feed');
                e.filter(event => event.type === 'PushEvent').slice(0, 5).forEach(event => {
                    const div = document.createElement('div');
                    div.className = 'feed-card';
                    const repo = event.repo.name.split('/')[1];
                    const count = event.payload.commits.length;
                    div.innerHTML = `
                        <div><b>+${count} Commits</b> to <a href="https://github.com/${event.repo.name}" target="_blank" class="event-repo">${repo}</a></div>
                        <div style="font-size: 10px; color: var(--text-dim); margin-top: 5px;">${new Date(event.created_at).toLocaleTimeString()}</div>
                    `;
                    feed.appendChild(div);
                });

            } catch (err) { console.error("Sync Error:", err); }
        }
        init();
    </script>
</body>
</html>
