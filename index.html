<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mmk1102x - Developer Dashboard</title>
    <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg">
    <!-- GitHub Calendar CSS -->
    <link rel="stylesheet" href="https://unpkg.com/github-calendar@latest/dist/github-calendar-responsive.css" />
    
    <style>
        :root {
            /* Light Theme */
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-sub: #6b7280;
            --accent: #2563eb;
            --border: #e5e7eb;
            --highlight: #eff6ff;
            --green: #10b981;
            --purple: #8b5cf6;
            --orange: #f59e0b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Dark Theme */
                --bg: #0d1117;
                --card-bg: #161b22;
                --text-main: #f3f4f6;
                --text-sub: #9ca3af;
                --accent: #58a6ff;
                --border: #30363d;
                --highlight: #1f2937;
                --green: #238636;
                --purple: #a371f7;
                --orange: #d29922;
            }
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            transition: background 0.3s;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* BENTO GRID LAYOUT */
        .bento-container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .bento-container {
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: auto auto auto;
            }
        }

        /* CARDS */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, border-color 0.2s;
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }
        
        .card:hover { transform: translateY(-2px); border-color: var(--accent); }

        /* Specific Grid Positions (Desktop) */
        @media (min-width: 768px) {
            .profile-card { grid-column: 1 / 2; grid-row: 1 / 3; }
            .stats-card { grid-column: 2 / 3; grid-row: 1 / 2; }
            .persona-card { grid-column: 3 / 4; grid-row: 1 / 2; }
            .tech-card { grid-column: 2 / 4; grid-row: 2 / 3; }
            .graph-card { grid-column: 1 / 4; grid-row: 3 / 4; }
            .activity-card { grid-column: 1 / 4; grid-row: 4 / 5; }
        }

        h2 { font-size: 14px; text-transform: uppercase; color: var(--text-sub); letter-spacing: 1px; margin: 0 0 16px 0; }
        
        /* 1. Profile Card */
        .avatar-area { text-align: center; margin-bottom: 20px; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--highlight); }
        .my-name { font-size: 28px; font-weight: 800; margin: 10px 0 5px; background: linear-gradient(45deg, var(--accent), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .my-login { color: var(--text-sub); font-size: 16px; font-family: monospace; }
        .my-bio { margin-top: 15px; color: var(--text-main); font-size: 15px; line-height: 1.6; text-align: center; }
        .follow-btn {
            background: var(--text-main); color: var(--card-bg); 
            padding: 10px; border-radius: 8px; text-align: center; margin-top: auto; font-weight: 600;
        }
        .follow-btn:hover { opacity: 0.9; text-decoration: none; }

        /* 2. Key Stats */
        .stat-grid { display: flex; justify-content: space-between; gap: 10px; }
        .stat-box {
            flex: 1; background: var(--highlight); border-radius: 12px; padding: 15px; text-align: center;
        }
        .stat-num { font-size: 24px; font-weight: 800; display: block; color: var(--text-main); }
        .stat-label { font-size: 12px; color: var(--text-sub); }

        /* 3. Persona */
        .persona-icon { font-size: 40px; margin-bottom: 10px; }
        .persona-title { font-size: 20px; font-weight: 700; margin-bottom: 5px; }
        .persona-desc { font-size: 13px; color: var(--text-sub); }

        /* 4. Tech Stack */
        .lang-bar { margin-bottom: 12px; }
        .lang-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; font-weight: 500; }
        .progress-bg { height: 8px; background: var(--highlight); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; animation: slideIn 1s ease-out forwards; width: 0; }

        /* 5. Calendar */
        .calendar-wrapper { min-height: 120px; }
        /* HIDE the broken text summary from the library */
        .calendar .contrib-footer, 
        .calendar .contrib-column { display: none !important; }
        .calendar { border: none !important; padding: 0 !important; min-height: 0 !important; }
        .js-calendar-graph { padding: 0 !important; }
        .js-calendar-graph-svg text.month { fill: var(--text-sub); font-size: 10px; }
        .js-calendar-graph-svg text.wday { fill: var(--text-sub); font-size: 9px; }

        /* 6. Activity Timeline */
        .commit-row {
            display: flex; gap: 15px; padding: 12px 0; border-bottom: 1px solid var(--highlight);
            align-items: center;
        }
        .commit-row:last-child { border-bottom: none; }
        .commit-sha {
            font-family: monospace; font-size: 12px; background: var(--highlight);
            padding: 2px 6px; border-radius: 4px; color: var(--accent);
        }
        .commit-msg { font-size: 14px; font-weight: 500; flex-grow: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .commit-date { font-size: 12px; color: var(--text-sub); white-space: nowrap; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { width: 0; } to { width: var(--w); } }

        .loading { color: var(--text-sub); font-style: italic; text-align: center; padding: 20px; }
        .error-msg { color: #cf222e; text-align: center; font-size: 13px; padding: 10px; }
    </style>
</head>
<body>

    <div class="bento-container">
        
        <!-- 1. Profile Card -->
        <div class="card profile-card" style="animation-delay: 0s">
            <div class="avatar-area">
                <img id="avatar" class="avatar" src="https://github.com/identicons/mmk1102x.png" alt="Avatar">
                <h1 id="name" class="my-name">mmk1102x</h1>
                <div id="login" class="my-login">@mmk1102x</div>
            </div>
            <p id="bio" class="my-bio">Fetching profile data...</p>
            <a href="https://github.com/mmk1102x" class="follow-btn">Visit GitHub Profile</a>
        </div>

        <!-- 2. Stats Card -->
        <div class="card stats-card" style="animation-delay: 0.1s">
            <h2>Impact</h2>
            <div class="stat-grid">
                <div class="stat-box">
                    <span id="total-stars" class="stat-num">-</span>
                    <span class="stat-label">Stars</span>
                </div>
                <div class="stat-box">
                    <span id="total-repos" class="stat-num">-</span>
                    <span class="stat-label">Repos</span>
                </div>
                <div class="stat-box">
                    <span id="followers" class="stat-num">-</span>
                    <span class="stat-label">Followers</span>
                </div>
            </div>
        </div>

        <!-- 3. Persona Card -->
        <div class="card persona-card" style="animation-delay: 0.2s">
            <h2>Coding Habit</h2>
            <div style="text-align: center; margin-top: auto; margin-bottom: auto;">
                <div id="persona-icon" class="persona-icon">🤔</div>
                <div id="persona-title" class="persona-title">Analyzing...</div>
                <div id="persona-desc" class="persona-desc">Checking commit timestamps</div>
            </div>
        </div>

        <!-- 4. Tech Stack Card -->
        <div class="card tech-card" style="animation-delay: 0.3s">
            <h2>Top Languages (by Repo)</h2>
            <div id="lang-list">
                <div class="loading">Scanning repositories...</div>
            </div>
        </div>

        <!-- 5. Graph Card -->
        <div class="card graph-card" style="animation-delay: 0.4s">
            <h2>Contribution Graph</h2>
            <div class="calendar-wrapper calendar">
                <!-- Graph loads here -->
            </div>
        </div>

        <!-- 6. Activity Card -->
        <div class="card activity-card" style="animation-delay: 0.5s">
            <h2>Recent History</h2>
            <div id="activity-list">
                <div class="loading">Loading commits...</div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/github-calendar@latest/dist/github-calendar.min.js"></script>
    <script>
        const USERNAME = 'mmk1102x';

        async function initDashboard() {
            try {
                // 1. User Profile
                const userRes = await fetch(`https://api.github.com/users/${USERNAME}`);
                if(!userRes.ok) throw new Error('User not found');
                const user = await userRes.json();
                
                document.getElementById('avatar').src = user.avatar_url;
                document.getElementById('name').textContent = user.name || USERNAME;
                document.getElementById('bio').textContent = user.bio || "No bio available.";
                document.getElementById('followers').textContent = user.followers;
                document.getElementById('total-repos').textContent = user.public_repos;

                // 2. Repositories (for Stars & Languages)
                // Fetch more pages if possible, but 100 is usually enough for overview
                const reposRes = await fetch(`https://api.github.com/users/${USERNAME}/repos?per_page=100&sort=updated`);
                const repos = await reposRes.json();
                
                calculateStats(repos);
                
                // 3. Calendar
                // We use the library but hide the text summary via CSS because it can be inaccurate
                GitHubCalendar(".calendar", USERNAME, { responsive: true, tooltips: true });

                // 4. Activity (Events) - For Persona & Timeline
                try {
                    const eventsRes = await fetch(`https://api.github.com/users/${USERNAME}/events?per_page=100`);
                    if (eventsRes.ok) {
                        const events = await eventsRes.json();
                        analyzePersona(events);
                        renderActivity(events);
                    } else {
                        // If blocked by adblockers, try fallback
                        throw new Error('Events blocked');
                    }
                } catch (evtErr) {
                    console.warn("Events API failed, switching to repo fallback", evtErr);
                    fallbackActivity(repos);
                }

            } catch (e) {
                console.error("Dashboard Error:", e);
                document.getElementById('activity-list').innerHTML = `<div class="error-msg">Failed to load data. GitHub API might be rate-limited.</div>`;
            }
        }

        function calculateStats(repos) {
            // A. Stars
            const stars = repos.reduce((acc, repo) => acc + repo.stargazers_count, 0);
            document.getElementById('total-stars').textContent = stars;

            // B. Languages
            // Logic: Count primary language of each repo.
            // Improvement: If total repos < 10, include forks in the calculation to give better data for new users.
            const includeForks = repos.length < 10;
            const langCounts = {};
            let total = 0;

            repos.forEach(repo => {
                if (!repo.language) return;
                if (repo.fork && !includeForks) return; // Skip forks if user has many repos

                langCounts[repo.language] = (langCounts[repo.language] || 0) + 1;
                total++;
            });

            const sortedLangs = Object.entries(langCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 4); // Top 4

            const langContainer = document.getElementById('lang-list');
            langContainer.innerHTML = '';

            const colors = { 
                JavaScript: '#f1e05a', HTML: '#e34c26', CSS: '#563d7c', 
                Python: '#3572A5', Java: '#b07219', TypeScript: '#2b7489', 
                Shell: '#89e051', C: '#555555', 'C++': '#f34b7d' 
            };

            if (sortedLangs.length === 0) {
                langContainer.innerHTML = '<div class="loading">No language data available.</div>';
                return;
            }

            sortedLangs.forEach(([lang, count]) => {
                const percent = Math.round((count / total) * 100);
                const color = colors[lang] || '#8b949e';
                
                langContainer.innerHTML += `
                    <div class="lang-bar">
                        <div class="lang-info">
                            <span>${lang}</span>
                            <span>${percent}%</span>
                        </div>
                        <div class="progress-bg">
                            <div class="progress-fill" style="background: ${color}; --w: ${percent}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        function analyzePersona(events) {
            // Filter push events
            const pushEvents = events.filter(e => e.type === 'PushEvent');
            if (pushEvents.length === 0) {
                document.getElementById('persona-desc').textContent = "No recent pushes found.";
                return;
            }

            const hours = pushEvents.map(e => new Date(e.created_at).getHours());
            const sum = hours.reduce((a, b) => a + b, 0);
            const avgHour = sum / hours.length;

            let icon = '👨‍💻';
            let title = 'Flexible Coder';
            let desc = 'You code whenever inspiration strikes.';

            if (avgHour >= 5 && avgHour < 12) {
                icon = '☕'; title = 'Morning Bird'; desc = 'You crush code before breakfast.';
            } else if (avgHour >= 12 && avgHour < 18) {
                icon = '🚀'; title = 'Daytime Pro'; desc = 'Strict business hours efficiency.';
            } else if (avgHour >= 18 || avgHour < 5) {
                icon = '🦉'; title = 'Night Owl'; desc = 'The best commits happen after dark.';
            }

            document.getElementById('persona-icon').textContent = icon;
            document.getElementById('persona-title').textContent = title;
            document.getElementById('persona-desc').textContent = desc;
        }

        function renderActivity(events) {
            const container = document.getElementById('activity-list');
            container.innerHTML = '';
            let count = 0;

            for (const event of events) {
                if (count >= 8) break; 
                // SAFETY CHECK: Ensure payload.commits exists before reading
                if (event.type === 'PushEvent' && event.payload && event.payload.commits) {
                    // Reverse to show newest commit in the push first
                    const commits = [...event.payload.commits].reverse();
                    
                    for (const commit of commits) {
                        if (count >= 8) break;
                        
                        const date = new Date(event.created_at).toLocaleDateString(undefined, {month:'short', day:'numeric'});
                        const msg = commit.message.split('\n')[0];
                        
                        const row = document.createElement('div');
                        row.className = 'commit-row';
                        row.innerHTML = `
                            <span class="commit-sha">${commit.sha.substring(0,7)}</span>
                            <span class="commit-msg" title="${msg}">${msg}</span>
                            <span class="commit-date">${date}</span>
                        `;
                        container.appendChild(row);
                        count++;
                    }
                }
            }
            if (count === 0) container.innerHTML = '<div class="loading">No recent commits found.</div>';
        }

        async function fallbackActivity(repos) {
            // Fallback: Get last 10 commits from the most recently updated repo
            // Logic: Include forks in search if non-forks are rare
            const sortedRepos = repos.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
            const activeRepo = sortedRepos[0]; // Just take the freshest one
            
            if (!activeRepo) {
                document.getElementById('activity-list').innerHTML = '<div class="loading">No repositories found.</div>';
                return;
            }

            const res = await fetch(`https://api.github.com/repos/${USERNAME}/${activeRepo.name}/commits?per_page=10`);
            const commits = await res.json();
            
            const container = document.getElementById('activity-list');
            container.innerHTML = '';
            
            commits.forEach(item => {
                const date = new Date(item.commit.committer.date).toLocaleDateString(undefined, {month:'short', day:'numeric'});
                const row = document.createElement('div');
                row.className = 'commit-row';
                row.innerHTML = `
                    <span class="commit-sha">${item.sha.substring(0,7)}</span>
                    <span class="commit-msg">${item.commit.message}</span>
                    <span class="commit-date">${date}</span>
                `;
                container.appendChild(row);
            });
        }

        initDashboard();
    </script>
</body>
</html>
